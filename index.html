<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Head Section -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHON DOE Portfolio</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- CSS Styling -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #007bff, #6610f2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      max-width: 400px;
      padding: 30px;
      text-align: center;
    }
    .profile-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }
    h1 {
      font-weight: 600;
      margin-bottom: 10px;
    }
    h4 {
      color: #007bff;
      margin-bottom: 20px;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- Content Section -->
  <div class="card">
    <!-- Profile Image Placeholder -->
    <img src="Mr.-Stanislas-Mithushan.jpg" alt="student Placeholder" 
     class="profile-img">
    
    <!-- Name -->
    <h1>JHON DOE</h1>
    
    <!-- Stream -->
    <h4>Computer Science Stream</h4>
    
    <!-- Short Bio -->
    <p>Hello! I’m Jhon Doe, a passionate web developer who loves creating modern, responsive, and interactive websites. My focus is on clean design and efficient code.</p>
  </div>

</body>
</html>
